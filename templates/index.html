<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Weather Data Analysis</h1>
        <form method="POST">
            <label for="date">Enter a Date (DD-MM-YYYY):</label>
            <input type="text" id="date" name="date" required placeholder="e.g., 01-01-2022">
            <input type="submit" value="Predict">
        </form>
        
        {% if tmin is not none %}
            <div class="results">
                <h2>Predicted Weather for {{ date }}:</h2>
                <ul>
                    <li><strong>Min Temperature:</strong> {{ tmin }}°C</li>
                    <li><strong>Max Temperature:</strong> {{ tmax }}°C</li>
                    <li><strong>Average Temperature:</strong> {{ tavg }}°C</li>
                    <li><strong>Precipitation:</strong> {{ prcp }} mm</li>
                </ul>
            </div>
        {% endif %}
    </div>
</body>
</html>
