<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Data Analysis</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #1e293b;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            text-align: left;
        }

        input[type="text"] {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input[type="text"]:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 8px rgba(99,102,241,0.4);
        }

        input[type="submit"] {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #6366f1;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        input[type="submit"]:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .results {
            margin-top: 25px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 10px;
            text-align: left;
        }

        .results h2 {
            margin-bottom: 10px;
            color: #1e293b;
        }

        ul {
            list-style: none;
        }

        li {
            margin-bottom: 8px;
            color: #334155;
        }

        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }

    </style>
</head>

<body>
    <div class="container">
        <h1>Weather Data Analysis</h1>

        <form method="POST">
            <label for="date">Enter a Date (DD-MM-YYYY):</label>
            <input type="text" id="date" name="date" required placeholder="e.g., 01-01-2022">
            <input type="submit" value="Predict">
        </form>
        
        {% if tmin is not none %}
            <div class="results">
                <h2>Predicted Weather for {{ date }}:</h2>
                <ul>
                    <li><strong>Min Temperature:</strong> {{ tmin }}°C</li>
                    <li><strong>Max Temperature:</strong> {{ tmax }}°C</li>
                    <li><strong>Average Temperature:</strong> {{ tavg }}°C</li>
                    <li><strong>Precipitation:</strong> {{ prcp }} mm</li>
                </ul>
            </div>
        {% endif %}

    </div>
</body>
</html>
